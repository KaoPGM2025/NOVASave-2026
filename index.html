<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVASave2026 V2.1 - Smart Saving System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        
        :root {
            --primary: #6366f1;
            --bg-light: #f8fafc;
            --card-light: #ffffff;
            --text-light: #1e293b;
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --text-dark: #f1f5f9;
        }

        body {
            font-family: 'Kanit', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        .dark-mode {
            background-color: var(--bg-dark);
            color: var(--text-dark);
        }

        .light-mode {
            background-color: var(--bg-light);
            color: var(--text-light);
        }

        .nav-active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        .glass-card {
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .rank-badge {
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body class="light-mode min-h-screen pb-20">

    <!-- Header / Profile Section -->
    <header class="p-6 max-w-lg mx-auto flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div id="profile-pic-container" class="relative">
                <img id="user-avatar" src="https://lh3.googleusercontent.com/a/default-user" alt="User Profile" class="w-12 h-12 rounded-full border-2 border-indigo-500 shadow-lg object-cover">
                <span id="rank-badge" class="absolute -bottom-1 -right-1 rank-badge bg-gray-500 text-white">Bronze</span>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-tight">NOVASave2026 <span class="text-xs font-normal opacity-70">V2.1</span></h1>
                <p id="user-display-name" class="text-sm opacity-80">ผู้ใช้งานระบบ</p>
            </div>
        </div>
        <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
            <i data-lucide="sun" id="theme-icon-sun"></i>
            <i data-lucide="moon" id="theme-icon-moon" class="hidden"></i>
        </button>
    </header>

    <!-- Main Content Containers -->
    <main class="max-w-lg mx-auto px-4">
        
        <!-- Dashboard Page -->
        <section id="page-dashboard" class="page">
            <div class="grid grid-cols-1 gap-4">
                <div class="p-6 bg-indigo-600 rounded-3xl text-white shadow-xl relative overflow-hidden">
                    <div class="relative z-10">
                        <p class="text-indigo-100 text-sm">เงินออมทั้งหมด</p>
                        <h2 class="text-4xl font-bold mt-1">฿ <span id="total-savings">0.00</span></h2>
                        <div class="mt-6">
                            <div class="flex justify-between text-xs mb-1">
                                <span>ความคืบหน้าเป้าหมาย</span>
                                <span id="goal-percent">0%</span>
                            </div>
                            <div class="w-full bg-indigo-800 rounded-full h-2">
                                <div id="goal-progress-bar" class="bg-white h-2 rounded-full transition-all duration-1000" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                    <i data-lucide="wallet" class="absolute -right-4 -bottom-4 w-32 h-32 opacity-10"></i>
                </div>

                <div class="p-4 bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-700">
                    <h3 class="font-semibold mb-3 flex items-center gap-2">
                        <i data-lucide="trending-up" class="w-4 h-4 text-green-500"></i> สถิติการออม
                    </h3>
                    <canvas id="savingsChart" height="200"></canvas>
                </div>

                <div class="p-4 bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-700">
                    <h3 class="font-semibold mb-2">AI วิเคราะห์การออม</h3>
                    <p id="ai-advice" class="text-sm text-gray-600 dark:text-gray-400">กำลังคำนวณข้อมูลของคุณ...</p>
                </div>
            </div>
        </section>

        <!-- Add Transaction Page -->
        <section id="page-add" class="page hidden">
            <h2 class="text-2xl font-bold mb-6">เพิ่มการออม</h2>
            <form id="save-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">จำนวนเงิน (บาท)</label>
                    <input type="number" id="input-amount" required placeholder="0.00" class="w-full p-4 rounded-2xl border dark:bg-slate-800 dark:border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">วันที่</label>
                    <input type="date" id="input-date" required class="w-full p-4 rounded-2xl border dark:bg-slate-800 dark:border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">หมวดหมู่/หมายเหตุ</label>
                    <select id="input-category" class="w-full p-4 rounded-2xl border dark:bg-slate-800 dark:border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="ทั่วไป">ทั่วไป</option>
                        <option value="รายวัน">รายวัน</option>
                        <option value="พิเศษ">พิเศษ</option>
                        <option value="หยอดกระปุก">หยอดกระปุก</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-indigo-700 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="plus-circle"></i> บันทึกข้อมูล
                </button>
            </form>
        </section>

        <!-- History Page -->
        <section id="page-history" class="page hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">ประวัติ (24 ชม.)</h2>
                <span class="text-xs opacity-60">อัปเดตอัตโนมัติ</span>
            </div>
            <div id="history-list" class="space-y-3">
                <!-- Data injected by JS -->
                <div class="text-center py-10 opacity-50">ไม่มีข้อมูลการออมใหม่</div>
            </div>
        </section>

        <!-- Goals Page -->
        <section id="page-goals" class="page hidden">
            <h2 class="text-2xl font-bold mb-6">เป้าหมายการออม</h2>
            <div class="p-6 bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-gray-100 dark:border-slate-700 space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">เป้าหมายที่คุณต้องการ (บาท)</label>
                    <input type="number" id="input-goal" placeholder="ระบุเป้าหมาย เช่น 10000" class="w-full p-4 rounded-2xl border dark:bg-slate-800 dark:border-slate-700 outline-none">
                </div>
                <button onclick="updateGoal()" class="w-full bg-emerald-500 text-white p-4 rounded-2xl font-bold shadow-lg">ตั้งค่าเป้าหมายใหม่</button>
            </div>
        </section>

        <!-- Settings Page -->
        <section id="page-settings" class="page hidden">
            <h2 class="text-2xl font-bold mb-6">ตั้งค่าระบบ</h2>
            <div class="space-y-4">
                <div class="p-4 bg-white dark:bg-slate-800 rounded-2xl border border-gray-100 dark:border-slate-700">
                    <h3 class="font-medium mb-3">โปรไฟล์ผู้ใช้</h3>
                    <div class="flex flex-wrap gap-2 mb-4">
                        <img onclick="changeAvatar('https://lh3.googleusercontent.com/a-/ALV-EMpY2TfI0j5XqZ7YJ5Xp')" src="https://lh3.googleusercontent.com/a-/ALV-EMpY2TfI0j5XqZ7YJ5Xp" class="w-10 h-10 rounded-full cursor-pointer hover:ring-2 ring-indigo-500">
                        <img onclick="changeAvatar('https://lh3.googleusercontent.com/a-/ALV-EMoV_5_Y3f5H3_G3X')" src="https://lh3.googleusercontent.com/a-/ALV-EMoV_5_Y3f5H3_G3X" class="w-10 h-10 rounded-full cursor-pointer hover:ring-2 ring-indigo-500">
                        <img onclick="changeAvatar('https://lh3.googleusercontent.com/a/default-user')" src="https://lh3.googleusercontent.com/a/default-user" class="w-10 h-10 rounded-full cursor-pointer hover:ring-2 ring-indigo-500">
                    </div>
                    <input type="text" id="input-username" placeholder="เปลี่ยนชื่อของคุณ" class="w-full p-3 rounded-xl border dark:bg-slate-700 dark:border-slate-600 mb-2 outline-none">
                    <button onclick="saveProfile()" class="text-sm text-indigo-500 font-semibold">บันทึกชื่อโปรไฟล์</button>
                </div>

                <div class="p-4 bg-white dark:bg-slate-800 rounded-2xl border border-gray-100 dark:border-slate-700 flex justify-between items-center">
                    <span>โหมดกลางคืน</span>
                    <button onclick="toggleTheme()" class="w-12 h-6 bg-gray-300 dark:bg-indigo-600 rounded-full relative transition-colors">
                        <div class="absolute top-1 left-1 dark:left-7 w-4 h-4 bg-white rounded-full transition-all"></div>
                    </button>
                </div>

                <button onclick="updateSystem()" class="w-full p-4 rounded-2xl bg-indigo-50 dark:bg-slate-700 text-indigo-600 dark:text-indigo-400 font-bold border border-indigo-100 dark:border-slate-600 flex items-center justify-center gap-2">
                    <i data-lucide="refresh-cw"></i> กดเพื่ออัปเดตระบบ/ดึงข้อมูลล่าสุด
                </button>

                <button onclick="clearAllData()" class="w-full p-4 rounded-2xl bg-red-50 text-red-500 font-bold border border-red-100 flex items-center justify-center gap-2">
                    <i data-lucide="trash-2"></i> ล้างข้อมูลทั้งหมดในระบบ
                </button>
            </div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-gray-100 dark:border-slate-800 px-4 py-2 flex justify-between items-center z-50 max-w-lg mx-auto">
        <button onclick="showPage('dashboard')" class="flex flex-col items-center p-2 nav-btn" id="btn-dashboard">
            <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">หน้าหลัก</span>
        </button>
        <button onclick="showPage('add')" class="flex flex-col items-center p-2 nav-btn" id="btn-add">
            <i data-lucide="plus-square" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">ออมเงิน</span>
        </button>
        <button onclick="showPage('history')" class="flex flex-col items-center p-2 nav-btn" id="btn-history">
            <i data-lucide="history" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">ประวัติ</span>
        </button>
        <button onclick="showPage('goals')" class="flex flex-col items-center p-2 nav-btn" id="btn-goals">
            <i data-lucide="target" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">เป้าหมาย</span>
        </button>
        <button onclick="showPage('settings')" class="flex flex-col items-center p-2 nav-btn" id="btn-settings">
            <i data-lucide="settings" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">ตั้งค่า</span>
        </button>
    </nav>

    <script>
        // Configuration
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4XOWYgkj1h83sv9BvN8ohzKVKUvEhyuCJwNOEz2V04s2EJWJAqKlR1yMEzzIlYoDSug/exec';
        
        // Initial State
        let state = {
            total: 0,
            goal: 5000,
            transactions: [],
            theme: 'light',
            user: {
                name: 'User 2026',
                avatar: 'https://lh3.googleusercontent.com/a/default-user',
                rank: 'Bronze'
            }
        };

        // Load data from LocalStorage
        function loadStorage() {
            const saved = localStorage.getItem('nova_save_data');
            if (saved) {
                state = JSON.parse(saved);
                // Clean old history (older than 24h)
                const now = new Date().getTime();
                state.transactions = state.transactions.filter(t => (now - t.timestamp) < (24 * 60 * 60 * 1000));
            }
            applyState();
        }

        function saveStorage() {
            localStorage.setItem('nova_save_data', JSON.stringify(state));
            applyState();
        }

        // Theme Toggle
        function toggleTheme() {
            state.theme = state.theme === 'light' ? 'dark' : 'light';
            document.body.classList.toggle('dark-mode', state.theme === 'dark');
            document.body.classList.toggle('light-mode', state.theme === 'light');
            document.getElementById('theme-icon-sun').classList.toggle('hidden', state.theme === 'dark');
            document.getElementById('theme-icon-moon').classList.toggle('hidden', state.theme === 'light');
            saveStorage();
        }

        // Navigation
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${pageId}`).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById(`btn-${pageId}`).classList.add('nav-active');
            
            if (pageId === 'dashboard') updateChart();
        }

        // Rank System
        function calculateRank() {
            const total = state.total;
            if (total >= 50000) return { name: 'Legendary', color: 'bg-red-600' };
            if (total >= 10000) return { name: 'Platinum', color: 'bg-blue-400' };
            if (total >= 5000) return { name: 'Gold', color: 'bg-yellow-500' };
            if (total >= 1000) return { name: 'Silver', color: 'bg-gray-400' };
            return { name: 'Bronze', color: 'bg-amber-700' };
        }

        // AI Advice
        function updateAI() {
            const adviceEl = document.getElementById('ai-advice');
            const percent = (state.total / state.goal) * 100;
            if (state.total === 0) adviceEl.innerText = "เริ่มออมวันนี้ เพื่อสร้างยศของคุณ!";
            else if (percent < 20) adviceEl.innerText = "ก้าวแรกสำคัญที่สุด ออมสม่ำเสมอจะช่วยให้ยศสูงขึ้น";
            else if (percent < 80) adviceEl.innerText = "คุณกำลังทำได้ดีมาก! ใกล้ความจริงแล้ว";
            else adviceEl.innerText = "สุดยอด! เป้าหมายอยู่แค่เอื้อม คุณมีวินัยที่น่าชื่นชม";
        }

        // Update UI with State
        function applyState() {
            document.getElementById('total-savings').innerText = state.total.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('user-display-name').innerText = state.user.name;
            document.getElementById('user-avatar').src = state.user.avatar;
            
            const rank = calculateRank();
            const badge = document.getElementById('rank-badge');
            badge.innerText = rank.name;
            badge.className = `absolute -bottom-1 -right-1 rank-badge text-white ${rank.color}`;

            const percent = Math.min((state.total / state.goal) * 100, 100);
            document.getElementById('goal-percent').innerText = `${percent.toFixed(0)}%`;
            document.getElementById('goal-progress-bar').style.width = `${percent}%`;

            renderHistory();
            updateAI();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            if (state.transactions.length === 0) {
                list.innerHTML = '<div class="text-center py-10 opacity-50">ไม่มีข้อมูลการออมใน 24 ชม.</div>';
                return;
            }
            list.innerHTML = state.transactions.map((t, index) => `
                <div class="flex items-center justify-between p-4 bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-gray-50 dark:border-slate-700">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-indigo-100 dark:bg-slate-700 rounded-xl flex items-center justify-center text-indigo-600">
                            <i data-lucide="piggy-bank"></i>
                        </div>
                        <div>
                            <p class="font-medium text-sm">${t.category}</p>
                            <p class="text-[10px] opacity-50">${new Date(t.timestamp).toLocaleTimeString('th-TH')}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-indigo-600">+฿${t.amount.toFixed(2)}</p>
                        <button onclick="deleteEntry(${index})" class="text-[10px] text-red-400">ลบ</button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Form Handling
        document.getElementById('save-form').onsubmit = function(e) {
            e.preventDefault();
            const amt = parseFloat(document.getElementById('input-amount').value);
            const date = document.getElementById('input-date').value;
            const cat = document.getElementById('input-category').value;

            Swal.fire({
                title: 'กำลังบันทึก...',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });

            // JSONP Submission to Apps Script
            const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
            window[callbackName] = function(response) {
                delete window[callbackName];
                document.body.removeChild(script);
                
                if (response.status === 'success') {
                    // Update Local State
                    state.total += amt;
                    state.transactions.unshift({
                        amount: amt,
                        date: date,
                        category: cat,
                        timestamp: new Date().getTime()
                    });
                    saveStorage();
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'บันทึกสำเร็จ!',
                        text: 'เงินออมของคุณถูกส่งไปยังระบบคลาวด์แล้ว',
                        timer: 1500,
                        showConfirmButton: false
                    });
                    
                    document.getElementById('save-form').reset();
                    showPage('dashboard');
                } else {
                    Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถบันทึกข้อมูลได้', 'error');
                }
            };

            const script = document.createElement('script');
            script.src = `${SCRIPT_URL}?callback=${callbackName}&amount=${amt}&category=${encodeURIComponent(cat)}&date=${date}&action=add`;
            document.body.appendChild(script);
        };

        // Actions
        function deleteEntry(index) {
            state.total -= state.transactions[index].amount;
            state.transactions.splice(index, 1);
            saveStorage();
        }

        function updateGoal() {
            const g = parseFloat(document.getElementById('input-goal').value);
            if (g > 0) {
                state.goal = g;
                saveStorage();
                Swal.fire('สำเร็จ', 'อัปเดตเป้าหมายแล้ว', 'success');
                showPage('dashboard');
            }
        }

        function saveProfile() {
            const name = document.getElementById('input-username').value;
            if (name) {
                state.user.name = name;
                saveStorage();
                Swal.fire('สำเร็จ', 'เปลี่ยนชื่อโปรไฟล์แล้ว', 'success');
            }
        }

        function changeAvatar(url) {
            state.user.avatar = url;
            saveStorage();
        }

        function updateSystem() {
            Swal.fire({
                title: 'อัปเดตระบบ...',
                text: 'กำลังดึงข้อมูลล่าสุดจาก Google Sheets',
                didOpen: () => {
                    Swal.showLoading();
                    // Mock update simulation (in real app, fetch all data via JSONP)
                    setTimeout(() => {
                        applyState();
                        Swal.fire('สำเร็จ', 'ข้อมูลเป็นปัจจุบันแล้ว (20/03/2026)', 'success');
                    }, 1000);
                }
            });
        }

        function clearAllData() {
            Swal.fire({
                title: 'ยืนยันการล้างข้อมูล?',
                text: "ข้อมูลเงินออมทั้งหมดจะหายไปจากเครื่องนี้!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'ล้างข้อมูลทั้งหมด'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('nova_save_data');
                    location.reload();
                }
            });
        }

        // Chart.js
        let myChart;
        function updateChart() {
            const ctx = document.getElementById('savingsChart').getContext('2d');
            if (myChart) myChart.destroy();
            
            // Generate last 7 days labels
            const labels = Array.from({length: 7}, (_, i) => {
                const d = new Date();
                d.setDate(d.getDate() - (6 - i));
                return d.toLocaleDateString('th-TH', {day:'numeric', month:'short'});
            });

            // Mock data mapping (Real app would filter state.transactions by date)
            const data = [0, 0, 0, 0, 0, 0, state.total]; 

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'เงินออมสะสม',
                        data: data,
                        borderColor: '#6366f1',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(99, 102, 241, 0.1)'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        // Init
        window.onload = () => {
            lucide.createIcons();
            loadStorage();
            document.getElementById('input-date').valueAsDate = new Date();
            updateChart();
        };
    </script>
</body>
</html>
