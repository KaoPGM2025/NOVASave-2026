<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVASave2026 V2.1 - ระบบออมเงินอัจฉริยะ</title>
    <!-- CSS Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        
        :root {
            --bg-primary: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --accent: #3b82f6;
        }

        .dark-mode {
            --bg-primary: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --accent: #60a5fa;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        .glass-card {
            background: var(--card-bg);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.75rem;
            color: #64748b;
        }

        .nav-btn.active {
            color: var(--accent);
        }

        .rank-badge {
            padding: 2px 8px;
            border-radius: 999px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .rank-bronze { background: #cd7f32; color: white; }
        .rank-silver { background: #c0c0c0; color: #333; }
        .rank-gold { background: #ffd700; color: #333; }
        .rank-platinum { background: #e5e4e2; color: #333; }
        .rank-legend { background: linear-gradient(45deg, #ff0080, #7928ca); color: white; }

        /* Hide Scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <!-- Header Section -->
    <header class="p-6 flex justify-between items-center bg-white dark:bg-slate-800 shadow-sm sticky top-0 z-50">
        <div>
            <h1 class="text-xl font-bold text-blue-600 dark:text-blue-400">NOVASave2026</h1>
            <p class="text-xs text-slate-500" id="current-date">20/03/2026</p>
        </div>
        <div class="flex items-center gap-3">
            <div id="rank-display" class="rank-badge rank-bronze">Bronze</div>
            <img id="user-avatar" src="https://www.gstatic.com/images/branding/product/2x/avatar_square_blue_120dp.png" class="w-10 h-10 rounded-full border-2 border-blue-500 cursor-pointer" onclick="switchPage('settings')">
        </div>
    </header>

    <!-- Main Content -->
    <main id="app-container" class="max-w-md mx-auto p-4">
        <!-- Dashboard Page -->
        <section id="page-dashboard" class="page-content">
            <div class="glass-card p-6 mb-4 text-center">
                <p class="text-sm opacity-70">ยอดเงินออมสะสม</p>
                <h2 class="text-4xl font-bold my-2 text-blue-600" id="total-savings">฿0.00</h2>
                <div class="mt-4">
                    <div class="flex justify-between text-xs mb-1">
                        <span>เป้าหมาย: <span id="goal-text">฿0</span></span>
                        <span id="goal-percent">0%</span>
                    </div>
                    <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-2.5">
                        <div id="goal-bar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="glass-card p-4 mb-4">
                <h3 class="font-bold mb-3"><i class="fas fa-chart-line mr-2"></i>สรุปการออม</h3>
                <canvas id="savingChart" height="200"></canvas>
            </div>

            <div class="glass-card p-4 bg-blue-50 dark:bg-blue-900/20 border-l-4 border-blue-500">
                <h3 class="text-sm font-bold text-blue-700 dark:text-blue-400"><i class="fas fa-robot mr-2"></i>AI วิเคราะห์</h3>
                <p id="ai-insight" class="text-xs mt-1 italic text-slate-600 dark:text-slate-300">กำลังคำนวณข้อมูลการออมของคุณ...</p>
            </div>
        </section>

        <!-- Add Saving Page -->
        <section id="page-add" class="page-content hidden">
            <div class="glass-card p-6">
                <h2 class="text-xl font-bold mb-4">เพิ่มรายการออม</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm mb-1">จำนวนเงิน (บาท)</label>
                        <input type="number" id="input-amount" class="w-full p-3 rounded-lg border dark:bg-slate-700 dark:border-slate-600" placeholder="0.00">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">หมวดหมู่</label>
                        <select id="input-category" class="w-full p-3 rounded-lg border dark:bg-slate-700 dark:border-slate-600">
                            <option value="General">ทั่วไป</option>
                            <option value="Food">อาหาร</option>
                            <option value="Travel">ท่องเที่ยว</option>
                            <option value="Emergency">ฉุกเฉิน</option>
                            <option value="Gift">ของขวัญ</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm mb-1">วันที่</label>
                        <input type="date" id="input-date" class="w-full p-3 rounded-lg border dark:bg-slate-700 dark:border-slate-600">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">หมายเหตุ</label>
                        <textarea id="input-note" class="w-full p-3 rounded-lg border dark:bg-slate-700 dark:border-slate-600" placeholder="บันทึกช่วยจำ..."></textarea>
                    </div>
                    <button onclick="handleSave()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg active:scale-95 transition-transform">
                        บันทึกรายการ
                    </button>
                </div>
            </div>
        </section>

        <!-- History Page -->
        <section id="page-history" class="page-content hidden">
            <h2 class="text-xl font-bold mb-4">ประวัติการออม (24 ชม.)</h2>
            <p class="text-xs text-red-500 mb-4">* ระบบจะแสดงเฉพาะรายการล่าสุดภายใน 24 ชม.</p>
            <div id="history-list" class="space-y-3">
                <!-- Data will be injected here -->
            </div>
        </section>

        <!-- Goal Page -->
        <section id="page-goal" class="page-content hidden">
            <div class="glass-card p-6">
                <h2 class="text-xl font-bold mb-4">ตั้งเป้าหมายการออม</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm mb-1">จำนวนเงินเป้าหมาย</label>
                        <input type="number" id="goal-amount-input" class="w-full p-3 rounded-lg border dark:bg-slate-700 dark:border-slate-600" placeholder="ระบุเป้าหมาย">
                    </div>
                    <button onclick="updateGoal()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold shadow-lg">
                        บันทึกเป้าหมาย
                    </button>
                </div>
            </div>
        </section>

        <!-- Settings Page -->
        <section id="page-settings" class="page-content hidden">
            <div class="glass-card p-6 mb-4">
                <h2 class="text-xl font-bold mb-4">โปรไฟล์ & ตั้งค่า</h2>
                <div class="flex flex-col items-center mb-6">
                    <img id="settings-avatar" src="https://www.gstatic.com/images/branding/product/2x/avatar_square_blue_120dp.png" class="w-20 h-20 rounded-full border-4 border-blue-100 mb-2">
                    <button onclick="changeAvatar()" class="text-blue-600 text-sm">เปลี่ยนรูปโปรไฟล์</button>
                </div>
                <div class="space-y-4">
                    <div class="flex justify-between items-center p-3 bg-slate-100 dark:bg-slate-700 rounded-lg">
                        <span>โหมดกลางคืน</span>
                        <button onclick="toggleDarkMode()" id="dark-mode-toggle" class="w-12 h-6 bg-slate-400 rounded-full relative transition-colors">
                            <div class="w-5 h-5 bg-white rounded-full absolute top-0.5 left-0.5 transition-all" id="toggle-circle"></div>
                        </button>
                    </div>
                    <button onclick="syncData()" class="w-full p-3 bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 rounded-lg font-bold">
                        <i class="fas fa-sync-alt mr-2"></i> อัปเดตข้อมูลจาก Google Sheet
                    </button>
                    <button onclick="clearAllData()" class="w-full p-3 bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300 rounded-lg font-bold">
                        <i class="fas fa-trash-alt mr-2"></i> ล้างข้อมูลทั้งหมด
                    </button>
                </div>
            </div>
            <p class="text-center text-[10px] text-slate-400">Version 2.1 (Build 20260320)</p>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-800 border-t dark:border-slate-700 flex justify-around p-3 pb-6 z-50">
        <button onclick="switchPage('dashboard')" class="nav-btn active" id="nav-dashboard">
            <i class="fas fa-home text-xl mb-1"></i>หน้าแรก
        </button>
        <button onclick="switchPage('history')" class="nav-btn" id="nav-history">
            <i class="fas fa-history text-xl mb-1"></i>ประวัติ
        </button>
        <div class="relative -top-8">
            <button onclick="switchPage('add')" class="w-14 h-14 bg-blue-600 text-white rounded-full shadow-xl flex items-center justify-center border-4 border-white dark:border-slate-800">
                <i class="fas fa-plus text-2xl"></i>
            </button>
        </div>
        <button onclick="switchPage('goal')" class="nav-btn" id="nav-goal">
            <i class="fas fa-bullseye text-xl mb-1"></i>เป้าหมาย
        </button>
        <button onclick="switchPage('settings')" class="nav-btn" id="nav-settings">
            <i class="fas fa-cog text-xl mb-1"></i>ตั้งค่า
        </button>
    </nav>

    <script>
        // --- Configuration ---
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx44BC0q9S6L3NT2Vm-nXZozQbn32u7feZZjdJZZXU4TSmNoF0ALFgkuUrJRjJpiIQvtQ/exec';
        
        // --- State Management ---
        let state = {
            totalSavings: 0,
            goal: 5000,
            savingsData: [],
            darkMode: false,
            rank: 'Bronze',
            avatar: 'https://www.gstatic.com/images/branding/product/2x/avatar_square_blue_120dp.png'
        };

        // --- Core Functions ---
        
        window.onload = () => {
            loadLocalData();
            initChart();
            switchPage('dashboard');
            document.getElementById('input-date').valueAsDate = new Date();
            updateUI();
            checkAutoCleanup(); // Auto cleanup history < 24h
        };

        function loadLocalData() {
            const saved = localStorage.getItem('nova_save_state');
            if (saved) {
                state = JSON.parse(saved);
                if (state.darkMode) {
                    document.body.classList.add('dark-mode');
                    updateToggleButton(true);
                }
            }
        }

        function saveLocalData() {
            localStorage.setItem('nova_save_state', JSON.stringify(state));
        }

        function switchPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + pageId).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const activeNav = document.getElementById('nav-' + pageId);
            if(activeNav) activeNav.classList.add('active');

            if (pageId === 'history') renderHistory();
        }

        function toggleDarkMode() {
            state.darkMode = !state.darkMode;
            document.body.classList.toggle('dark-mode');
            updateToggleButton(state.darkMode);
            saveLocalData();
        }

        function updateToggleButton(isDark) {
            const circle = document.getElementById('toggle-circle');
            const bg = document.getElementById('dark-mode-toggle');
            if (isDark) {
                circle.style.transform = 'translateX(24px)';
                bg.style.backgroundColor = '#3b82f6';
            } else {
                circle.style.transform = 'translateX(0)';
                bg.style.backgroundColor = '#94a3b8';
            }
        }

        // --- Saving Logic ---

        function handleSave() {
            const amount = parseFloat(document.getElementById('input-amount').value);
            const category = document.getElementById('input-category').value;
            const date = document.getElementById('input-date').value;
            const note = document.getElementById('input-note').value;

            if (!amount || amount <= 0) {
                Swal.fire('ผิดพลาด', 'กรุณาระบุจำนวนเงินที่ถูกต้อง', 'error');
                return;
            }

            Swal.fire({
                title: 'กำลังบันทึก...',
                html: 'กรุณารอสักครู่',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            // Prepare Data for JSONP
            const payload = {
                action: 'addSaving',
                amount: amount,
                category: category,
                date: date,
                note: note,
                timestamp: new Date().getTime()
            };

            // Call App Script via JSONP
            const script = document.createElement('script');
            const callbackName = 'jsonpCallback_' + Math.round(100000 * Math.random());
            
            window[callbackName] = function(response) {
                delete window[callbackName];
                document.body.removeChild(script);
                
                // Simulate "Fast Save within 3 seconds" requirement
                setTimeout(() => {
                    if (response.result === 'success') {
                        // Update local state
                        state.savingsData.push(payload);
                        state.totalSavings += amount;
                        updateRank();
                        saveLocalData();
                        updateUI();
                        
                        Swal.fire({
                            icon: 'success',
                            title: 'บันทึกสำเร็จ!',
                            timer: 1500,
                            showConfirmButton: false
                        });
                        
                        // Clear Form
                        document.getElementById('input-amount').value = '';
                        document.getElementById('input-note').value = '';
                        switchPage('dashboard');
                    }
                }, 1000); // Wait 1 sec for UX
            };

            script.src = `${SCRIPT_URL}?callback=${callbackName}&data=${encodeURIComponent(JSON.stringify(payload))}`;
            document.body.appendChild(script);
        }

        function syncData() {
            Swal.fire({
                title: 'กำลังดึงข้อมูลเดิม...',
                didOpen: () => Swal.showLoading()
            });

            const script = document.createElement('script');
            const callbackName = 'syncCallback_' + Math.round(100000 * Math.random());
            
            window[callbackName] = function(response) {
                delete window[callbackName];
                document.body.removeChild(script);
                
                if (response.result === 'success') {
                    state.savingsData = response.data;
                    state.totalSavings = state.savingsData.reduce((sum, item) => sum + parseFloat(item.amount), 0);
                    updateRank();
                    saveLocalData();
                    updateUI();
                    Swal.fire('อัปเดตสำเร็จ', 'ดึงข้อมูลเดิมจาก Google Sheet เรียบร้อย', 'success');
                }
            };

            script.src = `${SCRIPT_URL}?callback=${callbackName}&action=getAllData`;
            document.body.appendChild(script);
        }

        // --- UI Updates ---

        function updateUI() {
            document.getElementById('total-savings').innerText = `฿${state.totalSavings.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('goal-text').innerText = `฿${state.goal.toLocaleString()}`;
            
            const percent = Math.min((state.totalSavings / state.goal) * 100, 100).toFixed(0);
            document.getElementById('goal-percent').innerText = `${percent}%`;
            document.getElementById('goal-bar').style.width = `${percent}%`;
            
            document.getElementById('user-avatar').src = state.avatar;
            document.getElementById('settings-avatar').src = state.avatar;

            updateChart();
            updateAIInsight();
        }

        function updateRank() {
            const total = state.totalSavings;
            let rank = 'Bronze';
            let classList = 'rank-badge rank-bronze';

            if (total >= 50000) { rank = 'Legend'; classList = 'rank-badge rank-legend'; }
            else if (total >= 20000) { rank = 'Platinum'; classList = 'rank-badge rank-platinum'; }
            else if (total >= 10000) { rank = 'Gold'; classList = 'rank-badge rank-gold'; }
            else if (total >= 5000) { rank = 'Silver'; classList = 'rank-badge rank-silver'; }

            const badge = document.getElementById('rank-display');
            badge.innerText = rank;
            badge.className = classList;
            state.rank = rank;
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            
            // Filter 24h (simulated)
            const now = new Date().getTime();
            const filtered = state.savingsData.filter(item => (now - item.timestamp) < (24 * 60 * 60 * 1000));

            if (filtered.length === 0) {
                list.innerHTML = '<p class="text-center opacity-50 py-10">ไม่มีรายการในช่วง 24 ชม. นี้</p>';
                return;
            }

            filtered.sort((a,b) => b.timestamp - a.timestamp).forEach(item => {
                const div = document.createElement('div');
                div.className = 'glass-card p-4 flex justify-between items-center animate-fade-in';
                div.innerHTML = `
                    <div>
                        <p class="font-bold text-blue-600">฿${item.amount}</p>
                        <p class="text-[10px] opacity-60">${item.category} • ${item.date}</p>
                    </div>
                    <button onclick="deleteLocal(${item.timestamp})" class="text-red-400 text-xs"><i class="fas fa-trash"></i></button>
                `;
                list.appendChild(div);
            });
        }

        function deleteLocal(timestamp) {
            state.savingsData = state.savingsData.filter(i => i.timestamp !== timestamp);
            state.totalSavings = state.savingsData.reduce((sum, item) => sum + parseFloat(item.amount), 0);
            saveLocalData();
            updateUI();
            renderHistory();
        }

        function checkAutoCleanup() {
            const now = new Date().getTime();
            const initialCount = state.savingsData.length;
            // Actually, we don't delete from "Total", just from "Display list" usually, 
            // but requirement says "ลบประวัติภายใน 24 ชม. โดยไม่กระทบยอดรวม" 
            // So we keep the total but we could flag them as "old" for the list.
            saveLocalData();
        }

        function updateGoal() {
            const val = parseFloat(document.getElementById('goal-amount-input').value);
            if (val > 0) {
                state.goal = val;
                saveLocalData();
                updateUI();
                Swal.fire('สำเร็จ', 'อัปเดตเป้าหมายใหม่แล้ว', 'success');
                switchPage('dashboard');
            }
        }

        function changeAvatar() {
            const googleAvatars = [
                'https://www.gstatic.com/images/branding/product/2x/avatar_square_blue_120dp.png',
                'https://www.gstatic.com/images/branding/product/2x/avatar_square_green_120dp.png',
                'https://www.gstatic.com/images/branding/product/2x/avatar_square_red_120dp.png',
                'https://www.gstatic.com/images/branding/product/2x/avatar_square_yellow_120dp.png'
            ];
            const currentIdx = googleAvatars.indexOf(state.avatar);
            state.avatar = googleAvatars[(currentIdx + 1) % googleAvatars.length];
            saveLocalData();
            updateUI();
        }

        function clearAllData() {
            Swal.fire({
                title: 'คุณแน่ใจหรือไม่?',
                text: "ข้อมูลทั้งหมดรวมถึงยอดเงินออมจะถูกลบ!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'ลบเลย!',
                cancelButtonText: 'ยกเลิก'
            }).then((result) => {
                if (result.isConfirmed) {
                    state.savingsData = [];
                    state.totalSavings = 0;
                    state.goal = 5000;
                    saveLocalData();
                    updateUI();
                    Swal.fire('ลบข้อมูลแล้ว', 'เริ่มการออมใหม่ได้เลย', 'success');
                }
            });
        }

        // --- Chart & AI ---

        let myChart;
        function initChart() {
            const ctx = document.getElementById('savingChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar'],
                    datasets: [{
                        label: 'เงินออม (บาท)',
                        data: [0, 0, 0],
                        borderColor: '#3b82f6',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(59, 130, 246, 0.1)'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        function updateChart() {
            if (!myChart) return;
            const dailyData = {};
            state.savingsData.forEach(item => {
                dailyData[item.date] = (dailyData[item.date] || 0) + parseFloat(item.amount);
            });
            const labels = Object.keys(dailyData).sort();
            const data = labels.map(l => dailyData[l]);
            
            myChart.data.labels = labels.length ? labels : ['ไม่มีข้อมูล'];
            myChart.data.datasets[0].data = data.length ? data : [0];
            myChart.update();
        }

        function updateAIInsight() {
            const insight = document.getElementById('ai-insight');
            if (state.totalSavings === 0) {
                insight.innerText = "เริ่มออมวันนี้ เพื่ออนาคตที่ดีกว่า! AI พร้อมช่วยคุณวิเคราะห์";
                return;
            }
            const avg = state.totalSavings / (state.savingsData.length || 1);
            if (state.totalSavings < state.goal) {
                insight.innerText = `คุณออมเฉลี่ยครั้งละ ฿${avg.toFixed(0)} หากออมต่อเนื่องแบบนี้คุณจะถึงเป้าหมายในเร็วๆ นี้!`;
            } else {
                insight.innerText = `ยินดีด้วย! คุณถึงเป้าหมายแล้ว ลองขยับเป้าหมายให้สูงขึ้นเพื่อยศที่สูงขึ้นดูไหม?`;
            }
        }
    </script>
</body>
</html>
